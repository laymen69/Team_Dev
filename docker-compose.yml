version: '3.8'

services:
  db:
    image: postgres:15
    container_name: supervisor_db
    restart: always
    environment:
      POSTGRES_USER: supervisor
      POSTGRES_PASSWORD: supervisor_password
      POSTGRES_DB: supervisor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
